name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to EC2
        continue-on-error: true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Write PEM key
          echo "$EC2_SSH_KEY" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

          REMOTE_USER="ubuntu"
          REMOTE_DIR="/opt/trading-portal"

          # Sync code (excludes .env, venv, node_modules)
          rsync -avz --progress \
            --exclude 'venv' \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'frontend/.vite' \
            --exclude '.env' \
            -e "ssh -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no" \
            ./ "$REMOTE_USER@$EC2_HOST:$REMOTE_DIR/"

          # Install deps + restart service
          ssh -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no "$REMOTE_USER@$EC2_HOST" bash << 'ENDSSH'
            set -euo pipefail
            cd /opt/trading-portal

            if [ ! -d venv ]; then
              python3.12 -m venv venv
            fi

            venv/bin/pip install -q pandas-ta --no-deps
            venv/bin/pip install -q -r backend/requirements.txt

            sudo systemctl restart trading-backend
            echo "Deploy complete — $(date)"
          ENDSSH

          rm -f /tmp/deploy_key.pem
